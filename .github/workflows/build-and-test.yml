name: Security Audit CI - Lab 10

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'SecurityAudit' 

jobs:
  security-scan:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Audyt pakietow NuGet
      shell: pwsh
      run: |
        $out = dotnet list ${{ env.PROJECT_PATH }} package --vulnerable --include-transitive
        Write-Output $out
        
        if ($out -like "*Critical*" -or $out -like "*High*" -or $out -like "*Moderate*") {
          Write-Error "CRITICAL: Wykryto rzeczywiste podatnosci w zaleznosciach NuGet!"
          exit 1
        }
        Write-Output "Sukces: Brak znanych podatnosci w pakietach."

    - name: Build z analizatorami (SAST)
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release /p:TreatWarningsAsErrors=true

    - name: Generuj SBOM
      shell: pwsh
      run: |
        dotnet tool install --global Microsoft.Sbom.DotNetTool
        sbom-tool generate -b ./${{ env.PROJECT_PATH }}/bin/Release/net10.0 -bc ./${{ env.PROJECT_PATH }} -pn SecurityAuditApp -pv 1.0.0 -ps "Student Developer" -nsb "https://securityaudit.local" -nsu "sbom-v1"

    - name: Upload SBOM jako artefakt
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: '**/manifest.spdx.json'

    - name: Podpisz skrypt PowerShell
      shell: pwsh
      run: |
        $cert = New-SelfSignedCertificate -Subject "CN=Lab10 Student Developer" -Type CodeSigningCert -CertStoreLocation "Cert:\CurrentUser\My" -NotAfter (Get-Date).AddYears(2)
        Set-AuthenticodeSignature -FilePath "./${{ env.PROJECT_PATH }}/deploy.ps1" -Certificate $cert
        $sig = Get-AuthenticodeSignature "./${{ env.PROJECT_PATH }}/deploy.ps1"
        Write-Output "Status podpisu: $($sig.Status)"