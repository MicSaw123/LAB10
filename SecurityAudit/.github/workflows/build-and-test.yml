name: Build, Test and Security Audit

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'SecurityAudit'

jobs:
  build-test-audit:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Audit NuGet Vulnerabilities (Console Output)
      run: dotnet list ${{ env.PROJECT_PATH }} package --vulnerable --include-transitive

    - name: Generate NuGet Vulnerabilities Report (JSON)
      run: |
        dotnet list ${{ env.PROJECT_PATH }} package --vulnerable --format json > vuln-report.json
      continue-on-error: true

    - name: Build Application
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

    - name: Install Microsoft SBOM Tool
      run: dotnet tool install --global Microsoft.Sbom.DotNetTool

    - name: Generate SBOM
      run: |
        sbom-tool generate `
        -b ./${{ env.PROJECT_PATH }}/bin/Release/net10.0 `
        -bc ./${{ env.PROJECT_PATH }} `
        -pn SecurityAuditApp `
        -pv 1.0.0 `
        -ps "Student Developer" `
        -ns "https://securityaudit.local/sbom"
      shell: pwsh

    - name: Test with coverage
      run: >
        dotnet test ${{ env.PROJECT_PATH }}
        --configuration Release
        --no-build
        --collect:"XPlat Code Coverage"
        --results-directory ./coverage

    - name: Upload Security and SBOM Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: security-audit-outputs
        path: |
          vuln-report.json
          _manifest/
          ./coverage/**/coverage-cobertura.xml